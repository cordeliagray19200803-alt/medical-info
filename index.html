<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>発生状況</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    }

    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 20px 18px 36px;
    }

    .header {
      margin-bottom: 22px;
      padding: 16px;
      border-radius: 14px;
      background: #d32f2f;
      color: #ffffff;
      text-align: center;
      font-size: clamp(27px, 7vw, 34px);
      font-weight: 800;
      line-height: 1.3;
    }

    .lead {
      margin: 0 0 14px;
      font-size: clamp(18px, 4.8vw, 22px);
      font-weight: 700;
    }

    .choice {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      width: 100%;
      padding: 17px 2px;
      border-bottom: 2px solid #d32f2f;
      cursor: pointer;
    }

    .choice:first-of-type {
      border-top: 2px solid #d32f2f;
    }

    input[type="checkbox"] {
      flex: 0 0 auto;
      width: 27px;
      height: 27px;
      margin: 2px 0 0;
      accent-color: #d32f2f;
    }

    .label-text {
      font-size: clamp(18px, 4.8vw, 22px);
      font-weight: 700;
      line-height: 1.5;
    }

    .subtext {
      display: block;
      margin-top: 4px;
      color: #555555;
      font-size: clamp(15px, 4vw, 18px);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main>
    <div class="header">⏱️ 発生状況</div>

    <p class="lead">当てはまるものを選択してください。</p>

    <label class="choice">
      <input type="checkbox" data-destination="emergency.html">
      <span class="label-text">呼吸をしていない</span>
    </label>

    <label class="choice">
      <input type="checkbox" data-destination="emergency.html">
      <span class="label-text">胸のあたりが上下に動いていない</span>
    </label>

    <label class="choice">
      <input type="checkbox" data-destination="emergency.html">
      <span class="label-text">おなかに手を当てても上下に動いていない</span>
    </label>

    <label class="choice">
      <input type="checkbox" data-destination="symptoms.html">
      <span class="label-text">
        上記以外
        <span class="subtext">（呼吸をしていて、胸やおなかが上下に動いている）</span>
      </span>
    </label>
  </main>

  <script>
    document.querySelectorAll('input[type="checkbox"]').forEach((box) => {
      box.addEventListener("change", () => {
        if (box.checked) {
          window.location.href = box.dataset.destination;
        }
      });
    });
  </script>
</body>
</html>
