<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>症状・医療情報案内</title>
  <style>
    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: #f5f5f5;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    main {
      width: min(100%, 680px);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(24px, env(safe-area-inset-top)) 16px max(28px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
    }

    .panel {
      width: 100%;
      padding: 28px 18px;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, .10);
    }

    h1 {
      margin: 0 0 30px;
      text-align: center;
      font-size: clamp(28px, 7vw, 40px);
      line-height: 1.35;
      font-weight: 900;
      letter-spacing: .02em;
    }

    .buttons {
      display: grid;
      gap: 18px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 82px;
      padding: 18px 14px;
      border: 3px solid #111;
      border-radius: 16px;
      background: #fff;
      color: #111;
      text-align: center;
      text-decoration: none;
      font-size: clamp(21px, 5.5vw, 29px);
      line-height: 1.35;
      font-weight: 900;
      box-shadow: 0 4px 0 #111;
      transition: transform .08s ease, box-shadow .08s ease;
    }

    .button:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #111;
    }

    .button-jp {
      border-color: #c91f1f;
      color: #a91313;
      box-shadow: 0 4px 0 #c91f1f;
    }

    .button-en {
      border-color: #1769aa;
      color: #12558b;
      box-shadow: 0 4px 0 #1769aa;
    }

    .button-medical {
      border-color: #13713c;
      color: #0b5d2f;
      box-shadow: 0 4px 0 #13713c;
    }

    @media (max-width: 420px) {
      main { padding-left: 12px; padding-right: 12px; }
      .panel { padding: 24px 13px; border-radius: 18px; }
      h1 { margin-bottom: 25px; }
      .buttons { gap: 15px; }
      .button { min-height: 76px; padding-left: 9px; padding-right: 9px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel" aria-labelledby="page-title">
      <h1 id="page-title">症状・医療情報案内</h1>

      <nav class="buttons" aria-label="案内を選択">
        <!-- 公開中の日本語版症状チェックページへ移動 -->
        <a class="button button-jp" href="symptoms.html" target="_self">ご本人・周囲の方</a>

        <!-- 英語版ページを english.html として配置 -->
        <a class="button button-en" href="english.html" target="_self" lang="en">English Guide</a>

        <!-- 医療従事者向けページを medical.html として配置 -->
        <a class="button button-medical" href="New_emergency.html" target="_self">医療従事者・救急隊の方</a>
      </nav>
    </section>
  </main>
</body>
</html>
